services:

  mysql:
    image: mysql:8
    container_name: insurance-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: insurance_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  mongo:
    image: mongo:8
    container_name: insurance-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: .
    container_name: insurance-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Kolkata
      GROQ_API_KEY: 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
    depends_on:
      - mysql
      - mongo

  frontend:
    build: ../frontend
    container_name: insurance-ui
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql-data:
  mongo-data: